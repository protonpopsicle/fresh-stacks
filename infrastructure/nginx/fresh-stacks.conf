# Reverse proxy for fresh-stacks.org on the VM (direct traffic + TLS migration).
# Copy to /etc/nginx/sites-available/ on the VM, enable, then run certbot --nginx.
# Nginx runs on the host and proxies to the app container(s) on localhost.

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name fresh-stacks.org www.fresh-stacks.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS: proxy to hello app (and future apps by host/path)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name fresh-stacks.org www.fresh-stacks.org;

    ssl_certificate     /etc/letsencrypt/live/fresh-stacks.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fresh-stacks.org/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
