# For jonasal/nginx-certbot container. Proxies to app on host via host.docker.internal.
# Run the container with: --add-host=host.docker.internal:host-gateway

server {
    listen 80;
    listen [::]:80;
    server_name fresh-stacks.org www.fresh-stacks.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name fresh-stacks.org www.fresh-stacks.org;

    ssl_certificate     /etc/letsencrypt/live/fresh-stacks.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fresh-stacks.org/privkey.pem;

    location / {
        proxy_pass http://host.docker.internal:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
